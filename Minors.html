<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minors Availability - Rhythms School of Dance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f7f8fc; padding: 15px; }
        
        /* Header Styling */
        .header { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; padding: 25px 15px; border-radius: 15px; 
            text-align: center; margin-bottom: 20px; 
        }
        .badge-minor { 
            background: rgba(255,255,255,0.2); padding: 4px 12px; 
            border-radius: 20px; font-size: 0.7rem; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Form Styling */
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: 700; color: #4a5568; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #e0e4f0; border-radius: 10px; outline: none; }

        /* Calendar Grid Fix */
        .month-nav { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .month-btn { padding: 8px 16px; border-radius: 20px; border: none; background: white; cursor: pointer; font-weight: 600; }
        .month-btn.active { background: #667eea; color: white; }

        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 5px; /* Reduced gap to prevent overflow */
            width: 100%;
        }
        .day-label { text-align: center; font-size: 0.65rem; font-weight: 700; color: #a0aec0; padding-bottom: 5px; }
        
        .day-card { 
            background: #fff; border: 1px solid #f0f0f0; 
            border-radius: 8px; padding: 5px; text-align: center; 
            min-height: 80px; display: flex; flex-direction: column; gap: 4px;
        }
        .day-num { font-weight: 700; font-size: 0.8rem; margin-bottom: 2px; color: #2d3748; }

        /* Time Slot Buttons */
        .time-slot {
            width: 100%; padding: 6px 2px; font-size: 0.65rem; 
            font-weight: 700; border: 1px solid #edf2f7; 
            border-radius: 4px; background: #f8fafc; cursor: pointer;
        }
        .time-slot.selected { background: #667eea !important; color: white; border-color: #667eea; }
        .time-slot.na-slot { border-style: dashed; color: #718096; }
        .time-slot.na-slot.selected { background: #4a5568 !important; color: white; }

        /* Error Message */
        #errorMessage { 
            display: none; background: #fee2e2; color: #dc2626; 
            padding: 12px; border-radius: 10px; margin-bottom: 15px; 
            font-weight: 600; font-size: 0.9rem; text-align: center;
        }

        .submit-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; font-size: 1rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            body { padding: 40px; }
            .container { max-width: 800px; margin: 0 auto; }
            .time-slot { font-size: 0.75rem; padding: 8px 4px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="badge-minor">✨ Minors</span>
        <h1 style="margin-top:10px">Rhythms School of Dance</h1>
        <p style="font-size: 0.8rem; opacity: 0.9;">Parent Availability Calendar</p>
    </div>

    <div id="errorMessage">⚠️ Failed to submit. Please check your internet and try again.</div>

    <div class="card">
        <div class="input-group">
            <label>Parent Name *</label>
            <input type="text" id="parentName" placeholder="Enter your full name">
        </div>
        <div class="input-group" style="margin-bottom:0">
            <label>Child's Name *</label>
            <input type="text" id="childName" placeholder="Enter student's name">
        </div>
    </div>

    <div class="month-nav" id="monthNav"></div>
    <div id="calendarContainer"></div>

    <button class="submit-btn" id="submitBtn" onclick="submitAvailability()" style="margin-top: 20px;">Submit Availability</button>
</div>

<script src="../supabase-config.js"></script>
<script>
    const months = {
        may: { name: 'May', days: 31, startDay: 4, slots: ["6-8 PM"] },
        june: { name: 'June', days: 30, startDay: 0, slots: ["6-8 PM"] },
        july: { name: 'July', days: 31, startDay: 3, slots: ["6-8 PM"] },
        august: { name: 'August', days: 31, startDay: 6, slots: ["6-8 PM"] }
    };

    const satSlots = ["10AM-12PM", "12PM-4PM", "4PM-66PM"];
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    let currentMonth = 'july';
    let selections = { may: {}, june: {}, july: {}, august: {} };

    function init() {
        const nav = document.getElementById('monthNav');
        Object.keys(months).forEach(m => {
            const btn = document.createElement('button');
            btn.className = `month-btn ${m === currentMonth ? 'active' : ''}`;
            btn.textContent = months[m].name;
            btn.onclick = () => switchMonth(m);
            nav.appendChild(btn);
        });
        renderCalendar();
    }

    function switchMonth(m) {
        currentMonth = m;
        document.querySelectorAll('.month-btn').forEach(b => b.classList.toggle('active', b.textContent === months[m].name));
        renderCalendar();
    }

    function renderCalendar() {
        const config = months[currentMonth];
        const container = document.getElementById('calendarContainer');
        container.innerHTML = `<div class="calendar-grid" id="grid"></div>`;
        const grid = document.getElementById('grid');

        dayNames.forEach(d => grid.innerHTML += `<div class="day-label">${d}</div>`);

        for (let i = 0; i < config.startDay; i++) grid.innerHTML += `<div></div>`;

        for (let day = 1; day <= config.days; day++) {
            const dayOfWeek = (config.startDay + day - 1) % 7;
            const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
            const dayCard = document.createElement('div');
            dayCard.className = 'day-card';
            dayCard.innerHTML = `<div class="day-num">${day}</div>`;

            // Saturday has special slots, Sunday is empty, Weekdays have 6-8PM
            let availableSlots = dayOfWeek === 6 ? satSlots : (dayOfWeek === 0 ? [] : config.slots);
            
            if (availableSlots.length > 0) {
                availableSlots.forEach(slot => {
                    const btn = document.createElement('button');
                    btn.className = 'time-slot';
                    if (selections[currentMonth][day]?.includes(slot)) btn.classList.add('selected');
                    btn.textContent = slot;
                    btn.onclick = () => toggleSlot(day, slot);
                    dayCard.appendChild(btn);
                });

                const naBtn = document.createElement('button');
                naBtn.className = 'time-slot na-slot';
                if (selections[currentMonth][day]?.includes("N/A")) naBtn.classList.add('selected');
                naBtn.textContent = "N/A";
                naBtn.onclick = () => toggleSlot(day, "N/A");
                dayCard.appendChild(naBtn);
            }
            grid.appendChild(dayCard);
        }
    }

    function toggleSlot(day, slot) {
        if (!selections[currentMonth][day]) selections[currentMonth][day] = [];
        
        if (slot === "N/A") {
            selections[currentMonth][day] = selections[currentMonth][day].includes("N/A") ? [] : ["N/A"];
        } else {
            selections[currentMonth][day] = selections[currentMonth][day].filter(s => s !== "N/A");
            if (selections[currentMonth][day].includes(slot)) {
                selections[currentMonth][day] = selections[currentMonth][day].filter(s => s !== slot);
            } else {
                selections[currentMonth][day].push(slot);
            }
        }
        renderCalendar();
    }

    async function submitAvailability() {
        const pName = document.getElementById('parentName').value.trim();
        const cName = document.getElementById('childName').value.trim();
        const btn = document.getElementById('submitBtn');
        const err = document.getElementById('errorMessage');

        if (!pName || !cName) return alert("Please enter both names.");

        btn.disabled = true;
        btn.textContent = "Submitting...";
        err.style.display = 'none';

        try {
            const { error } = await _supabase.from('availability').insert([{
                parent_name: pName,
                child_name: cName,
                category: 'minor',
                selections: selections
            }]);

            if (error) throw error;
            alert("Success! Availability submitted.");
            window.location.reload(); 
        } catch (e) {
            console.error(e);
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = "Submit Availability";
        }
    }

    init();
</script>

</body>
</html>
